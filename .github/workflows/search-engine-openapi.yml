name: Validate Search Engine OpenAPI

on:
  pull_request:
    paths:
      - 'search-engine/src/app/api/**'
      - 'search-engine/src/openapi/**'
      - 'search-engine/src/scripts/generate-openapi.ts'
      - 'search-engine/package.json'
      - 'search-engine/package-lock.json'
      - '.github/workflows/search-engine-openapi.yml'
  push:
    branches:
      - main
    paths:
      - 'search-engine/src/app/api/**'
      - 'search-engine/src/openapi/**'
      - 'search-engine/src/scripts/generate-openapi.ts'
      - 'search-engine/package.json'
      - 'search-engine/package-lock.json'
      - '.github/workflows/search-engine-openapi.yml'
  workflow_dispatch:

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: search-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: search-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate OpenAPI
        run: npm run generate:openapi

      - name: Ensure OpenAPI is committed
        run: git diff --exit-code -- public/openapi.json
